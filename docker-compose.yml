services:
  test-coverage-bot:
    build: .
    env_file:
      - .env.local
    environment:
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-apache/superset}
      ISSUE_LABEL: ${ISSUE_LABEL:-coverage-improvement}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-600}
    volumes:
      - ./outputs:/app/outputs
    command:
      - --repo
      - ${GITHUB_REPOSITORY:-apache/superset}
      - --label
      - ${ISSUE_LABEL:-coverage-improvement}
      - --fixture
      - examples/github-issues-coverage-improvement.fixture.json
      - --dry-run
      - --once
      - --output-dir
      - outputs
